{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <h1 class="display-4 mb-4">Contact Me</h1>
            <p class="lead">Have a project in mind? Let's work together!</p>
            
            <div class="row mt-5">
                <div class="col-md-6">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Contact Information</h5>
                            <p class="card-text">
                                <strong>Email:</strong> nomankanodia@gmail.com<br>
                                <strong>Phone:</strong> +(91) 723-100-5711<br>
                                <strong>Location:</strong> Jhunjhunu, Rajasthan
                            </p>
                            <hr>
                            <h6>Connect with me:</h6>
                            <div class="d-flex gap-3">
                                <a href="https://www.linkedin.com/in/md-noman-19863622b" class="btn btn-outline-primary">LinkedIn</a>
                                <a href="https://x.com/KanodiaNoman?t=32UIHOcy8Lrxktom_SxYrA&s=09" class="btn btn-outline-info">Twitter</a>
                                <a href="https://github.com/NomanKanodia" class="btn btn-outline-secondary">GitHub</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
