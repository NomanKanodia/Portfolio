<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Game</title>
    <link rel="stylesheet" href="/projects/wordle/styles.css">
</head>
<body>
    <div class="container">
        <h1>Wordle Game</h1>
        <div class="grid" id="grid"></div>
        <div class="input-section">
            <input type="text" id="guessInput" maxlength="5" placeholder="Enter your guess" autofocus>
            <button onclick="submitGuess()">Submit</button>
        </div>
        <p id="message"></p>
    </div>
    <script src="/projects/wordle/script.js"></script>
</body>
</html>
